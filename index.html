<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satguru Transport – Logistics & Transport Services Delhi</title>
    <meta
      name="description"
      content="Satguru Transport – Reliable logistics and transport services across India. FTL, refrigerated transport, intercity & interstate services. 18+ years experience. Based in Delhi."
    />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --red: #1a3a5c;
        --red-dark: #0f2540;
        --red-light: #2563a8;
        --red-faint: #eef3f9;
        --accent: #e8a020;
        --accent-dark: #c47a10;
        --gray-50: #f5f7fa;
        --gray-100: #e8ecf1;
        --gray-300: #b8c2ce;
        --gray-500: #6b7a8d;
        --gray-700: #334155;
        --gray-900: #0f1b2d;
        --white: #ffffff;
        --font-display: "Barlow Condensed", sans-serif;
        --font-body: "Barlow", sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font-body);
        background: var(--white);
        color: var(--gray-900);
        line-height: 1.6;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        cursor: pointer;
        border: none;
        background: none;
        font: inherit;
      }

      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(20, 18, 16, 0.96);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .nav-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        height: 64px;
      }
      .nav-logo {
        font-family: var(--font-display);
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        color: var(--white);
      }
      .nav-logo span {
        color: var(--accent);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
      }
      .nav-links a {
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--white);
      }
      .nav-cta {
        background: var(--red);
        color: var(--white) !important;
        padding: 8px 20px;
        border-radius: 4px;
        font-weight: 600 !important;
        transition: background 0.2s !important;
      }
      .nav-cta:hover {
        background: var(--red-light) !important;
      }
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        padding: 4px;
      }
      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: var(--white);
        border-radius: 2px;
      }
      .mobile-menu {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(20, 18, 16, 0.98);
        padding: 1.5rem 2rem;
        flex-direction: column;
        gap: 1rem;
        z-index: 99;
      }
      .mobile-menu.open {
        display: flex;
      }
      .mobile-menu a {
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
        padding: 0.5rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      section {
        scroll-margin-top: 64px;
      }

      .hero {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #071320 0%,
          #0f2540 50%,
          #1a3a5c 100%
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 100px 2rem 60px;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          -55deg,
          transparent,
          transparent 40px,
          rgba(232, 160, 32, 0.04) 40px,
          rgba(232, 160, 32, 0.04) 41px
        );
      }
      .hero-inner {
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        position: relative;
        z-index: 1;
      }
      .hero-badge {
        display: inline-block;
        background: var(--red);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 2px;
        margin-bottom: 1.5rem;
      }
      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(3rem, 8vw, 6.5rem);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.01em;
        color: var(--white);
        margin-bottom: 1.5rem;
        text-transform: uppercase;
      }
      .hero h1 em {
        color: var(--accent);
        font-style: normal;
      }
      .hero-sub {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.6);
        max-width: 540px;
        margin-bottom: 2.5rem;
        line-height: 1.7;
      }
      .hero-stats {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        margin-bottom: 2.5rem;
      }
      .hero-stat {
        display: flex;
        flex-direction: column;
      }
      .hero-stat-num {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
      }
      .hero-stat-label {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }
      .hero-actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .btn-primary {
        background: var(--red);
        color: #fff;
        padding: 14px 32px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition:
          background 0.2s,
          transform 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-primary:hover {
        background: var(--red-light);
        transform: translateY(-1px);
      }
      .btn-outline {
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        padding: 14px 32px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-outline:hover {
        border-color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.06);
        transform: translateY(-1px);
      }
      .scroll-down {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 1;
      }
      .scroll-arrow {
        width: 1px;
        height: 40px;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.3),
          transparent
        );
      }

      .ticker {
        background: var(--accent);
        padding: 10px 0;
        overflow: hidden;
      }
      .ticker-track {
        display: flex;
        gap: 3rem;
        animation: ticker 25s linear infinite;
        white-space: nowrap;
      }
      .ticker-item {
        font-family: var(--font-display);
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(10, 30, 60, 0.9);
        flex-shrink: 0;
      }
      .ticker-dot {
        color: rgba(10, 30, 60, 0.4);
      }
      @keyframes ticker {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .section-header {
        text-align: center;
        margin-bottom: 3rem;
      }
      .section-eyebrow {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--red);
        margin-bottom: 0.75rem;
      }
      .section-title {
        font-family: var(--font-display);
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        line-height: 1.1;
        color: var(--gray-900);
      }
      .section-title span {
        color: var(--red);
      }
      .section-desc {
        margin-top: 1rem;
        font-size: 1rem;
        color: var(--gray-500);
        max-width: 540px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.7;
      }

      .about {
        background: var(--gray-50);
        padding: 6rem 2rem;
      }
      .about-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5rem;
        align-items: center;
      }
      .about-left {
      }
      .about-left .section-header {
        text-align: left;
        margin-bottom: 1.5rem;
      }
      .about-text {
        color: var(--gray-500);
        line-height: 1.8;
        margin-bottom: 1.5rem;
      }
      .certs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }
      .cert-badge {
        background: var(--white);
        border: 1px solid var(--gray-100);
        padding: 6px 14px;
        border-radius: 4px;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--gray-700);
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .cert-badge::before {
        content: "";
        display: block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
      }
      .about-right {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .about-card {
        background: var(--white);
        border: 1px solid var(--gray-100);
        border-radius: 8px;
        padding: 1.5rem;
        transition: box-shadow 0.2s;
      }
      .about-card:hover {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .about-card:first-child {
        background: var(--red);
        color: #fff;
      }
      .about-card:first-child .card-num {
        color: #fff;
      }
      .about-card:first-child .card-label {
        color: rgba(255, 255, 255, 0.7);
      }
      .card-num {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--red);
        line-height: 1;
      }
      .card-label {
        font-size: 0.82rem;
        color: var(--gray-500);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
      }

      .services {
        padding: 6rem 2rem;
        background: var(--white);
      }
      .services-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .services-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }
      .service-card {
        border: 1px solid var(--gray-100);
        border-radius: 8px;
        padding: 2rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
        position: relative;
        overflow: hidden;
      }
      .service-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--red);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s;
      }
      .service-card:hover {
        border-color: var(--gray-300);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
        transform: translateY(-3px);
      }
      .service-card:hover::after {
        transform: scaleX(1);
      }
      .service-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, var(--red-faint), #dce8f7);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
        font-size: 1.5rem;
        border: 1px solid rgba(37, 99, 168, 0.15);
        box-shadow: 0 2px 8px rgba(37, 99, 168, 0.1);
      }
      .service-icon svg {
        width: 28px;
        height: 28px;
        stroke: var(--red);
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .service-title {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--gray-900);
        margin-bottom: 0.75rem;
      }
      .service-desc {
        font-size: 0.9rem;
        color: var(--gray-500);
        line-height: 1.7;
      }

      .truck-gallery {
        background: var(--gray-50);
        padding: 5rem 2rem;
      }
      .truck-gallery-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .truck-photos-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        grid-template-rows: 260px 220px;
        gap: 1rem;
        margin-top: 2.5rem;
      }
      .truck-photo {
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      .truck-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
        display: block;
      }
      .truck-photo:hover img {
        transform: scale(1.04);
      }
      .truck-photo-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(
          to top,
          rgba(15, 37, 64, 0.85),
          transparent
        );
        color: #fff;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 1.5rem 1rem 0.75rem;
      }
      .truck-photo.tall {
        grid-row: 1 / 3;
      }
      @media (max-width: 900px) {
        .truck-photos-grid {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto;
        }
        .truck-photo.tall {
          grid-row: auto;
        }
        .truck-photo {
          height: 200px;
        }
      }
      @media (max-width: 600px) {
        .truck-photos-grid {
          grid-template-columns: 1fr;
        }
      }

      .fleet {
        background: var(--gray-900);
        padding: 6rem 2rem;
      }
      .fleet-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .fleet .section-title {
        color: var(--white);
      }
      .fleet .section-eyebrow {
        color: var(--accent);
      }
      .fleet .section-desc {
        color: rgba(255, 255, 255, 0.45);
      }
      .fleet-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-top: 3rem;
      }
      .fleet-item {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .fleet-item:hover {
        background: rgba(37, 99, 168, 0.12);
        border-color: rgba(37, 99, 168, 0.35);
      }
      .fleet-count {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
      }
      .fleet-type {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 6px;
        font-weight: 500;
      }
      .fleet-special {
        margin-top: 2rem;
        background: rgba(37, 99, 168, 0.15);
        border: 1px solid rgba(37, 99, 168, 0.3);
        border-radius: 8px;
        padding: 1.5rem 2rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .fleet-special-label {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
      }
      .fleet-special-desc {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
      }

      .industries {
        padding: 6rem 2rem;
        background: var(--white);
      }
      .industries-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .industries-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 3rem;
      }
      .industry-pill {
        padding: 10px 20px;
        border: 1px solid var(--gray-100);
        border-radius: 100px;
        font-size: 0.88rem;
        font-weight: 500;
        color: var(--gray-700);
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
        cursor: default;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .industry-pill:hover {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }
      .industry-pill span {
        font-size: 1rem;
      }

      .coverage {
        background: var(--gray-50);
        padding: 6rem 2rem;
      }
      .coverage-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5rem;
        align-items: start;
      }
      .routes-list {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .route-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1rem;
        background: var(--white);
        border: 1px solid var(--gray-100);
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--gray-700);
        transition: border-color 0.2s;
      }
      .route-item:hover {
        border-color: var(--red);
      }
      .route-origin {
        color: var(--red);
        font-weight: 700;
      }
      .route-arrow {
        color: var(--gray-300);
        font-size: 0.75rem;
      }
      .states-badge {
        margin-top: 2rem;
        background: var(--red);
        color: #fff;
        padding: 1rem 1.5rem;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
      }
      .states-badge strong {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 800;
        display: block;
      }

      .clients {
        padding: 6rem 2rem;
        background: var(--white);
      }
      .clients-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .clients-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
        background: var(--gray-100);
        border: 1px solid var(--gray-100);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 3rem;
      }
      .client-cell {
        background: var(--white);
        padding: 1.5rem 2rem;
        display: flex;
        align-items: center;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        transition: background 0.15s;
      }
      .client-cell:hover {
        background: var(--red-faint);
      }

      .quote-section {
        background: linear-gradient(135deg, #0f2540 0%, #1a3a5c 100%);
        padding: 6rem 2rem;
      }
      .quote-inner {
        max-width: 900px;
        margin: 0 auto;
        text-align: center;
      }
      .quote-inner .section-eyebrow {
        color: rgba(255, 255, 255, 0.6);
      }
      .quote-inner .section-title {
        color: var(--white);
      }
      .quote-inner .section-desc {
        color: rgba(255, 255, 255, 0.7);
      }
      .quote-form {
        background: var(--white);
        border-radius: 10px;
        padding: 2.5rem;
        margin-top: 3rem;
        text-align: left;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: 1 / -1;
      }

      function QuoteSection() {
        const [form, setForm] = useState({
          name: "",
          company: "",
          phone: "",
          email: "",
          from: "",
          to: "",
          vehicle: "",
          cargo: "",
          message: "",
        });
        const [submitted, setSubmitted] = useState(false);
        const [sending, setSending] = useState(false);
        const [error, setError] = useState("");

        const handleChange = (e) =>
          setForm((f) => ({ ...f, [e.target.name]: e.target.value }));

        const handleSubmit = () => {
          if (!form.name || !form.phone) {
            setError("Please fill in your name and phone number.");
            return;
          }
          setError("");
          setSending(true);

          emailjs
            .send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
              from_name: form.name,
              phone: form.phone,
              email: form.email || "Not provided",
              company: form.company || "Not provided",
              from_city: form.from || "Not specified",
              to_city: form.to || "Not specified",
              vehicle: form.vehicle || "Not specified",
              cargo: form.cargo || "Not specified",
              message: form.message || "—",
            })
            .then(() => {
              setSending(false);
              setSubmitted(true);
            })
            .catch((err) => {
              setSending(false);
              setError(
                "Something went wrong. Please call us directly or try again.",
              );
              console.error("EmailJS error:", err);
            });
        };

        return (
          <section id="quote" className="quote-section">
            <div className="quote-inner">
              <div className="section-eyebrow">Request a Quote</div>
              <h2 className="section-title" style={{ color: "var(--white)" }}>
                Get Your{" "}
                <span style={{ color: "rgba(255,255,255,0.5)" }}>
                  Free Quote
                </span>
              </h2>
              <p className="section-desc">
                Tell us about your shipment and we'll get back to you as soon as
                possible.
              </p>
              <div className="quote-form">
                {submitted ? (
                  <div style={{ textAlign: "center", padding: "2rem" }}>
                    <div style={{ fontSize: "3rem", marginBottom: "1rem" }}>
                      ✅
                    </div>
                    <h3
                      style={{
                        fontFamily: "var(--font-display)",
                        fontSize: "1.8rem",
                        fontWeight: 800,
                        textTransform: "uppercase",
                        color: "var(--gray-900)",
                        marginBottom: "0.5rem",
                      }}
                    >
                      Thank You!
                    </h3>
                    <p style={{ color: "var(--gray-500)" }}>
                      We've received your request and will contact you as soon
                      as possible.
                    </p>
                    <div
                      style={{
                        marginTop: "1.5rem",
                        display: "flex",
                        gap: "1rem",
                        justifyContent: "center",
                        flexWrap: "wrap",
                      }}
                    >
                      <a href="tel:+919971130303" className="btn-primary">
                        📞 Call Us Now
                      </a>
                      <button
                        className="btn-outline"
                        style={{
                          color: "var(--gray-700)",
                          border: "1.5px solid var(--gray-300)",
                        }}
                        onClick={() => setSubmitted(false)}
                      >
                        Submit Another
                      </button>
                    </div>
                  </div>
                ) : (
                  <>
                    <div className="form-grid">
                      {[
                        {
                          name: "name",
                          placeholder: "Your Full Name",
                          label: "Name *",
                        },
                        {
                          name: "company",
                          placeholder: "Company Name",
                          label: "Company",
                        },
                        {
                          name: "phone",
                          placeholder: "+91 99711 30303",
                          label: "Phone *",
                        },
                        {
                          name: "email",
                          placeholder: "email@company.com",
                          label: "Email",
                        },
                        {
                          name: "from",
                          placeholder: "Origin City",
                          label: "From",
                        },
                        {
                          name: "to",
                          placeholder: "Destination City",
                          label: "To",
                        },
                      ].map((f) => (
                        <div key={f.name} className="form-group">
                          <label className="form-label">{f.label}</label>
                          <input
                            className="form-input"
                            name={f.name}
                            placeholder={f.placeholder}
                            value={form[f.name]}
                            onChange={handleChange}
                          />
                        </div>
                      ))}
                      <div className="form-group">
                        <label className="form-label">Vehicle Type</label>
                        <select
                          className="form-select"
                          name="vehicle"
                          value={form.vehicle}
                          onChange={handleChange}
                        >
                          <option value="">Select vehicle...</option>
                          <option>TATA ACE</option>
                          <option>TATA 407</option>
                          <option>14 FT Truck</option>
                          <option>17 FT Truck</option>
                          <option>20 FT Truck</option>
                          <option>22 FT Truck</option>
                          <option>Refrigerated 22 FT</option>
                        </select>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Cargo Type</label>
                        <input
                          className="form-input"
                          name="cargo"
                          placeholder="e.g. Pharmaceuticals, Steel..."
                          value={form.cargo}
                          onChange={handleChange}
                        />
                      </div>
                      <div className="form-group full">
                        <label className="form-label">Additional Details</label>
                        <textarea
                          className="form-textarea"
                          name="message"
                          placeholder="Any special requirements, weight, timeline..."
                          value={form.message}
                          onChange={handleChange}
                        />
                      </div>
                    </div>
                    {error && (
                      <p
                        style={{
                          color: "#e53e3e",
                          marginBottom: "0.75rem",
                          fontSize: "0.9rem",
                          textAlign: "center",
                        }}
                      >
                        ⚠️ {error}
                      </p>
                    )}
                    <button
                      className="form-submit"
                      onClick={handleSubmit}
                      disabled={sending}
                      style={{
                        opacity: sending ? 0.7 : 1,
                        cursor: sending ? "not-allowed" : "pointer",
                      }}
                    >
                      {sending ? "Sending…" : "Submit Quote Request →"}
                    </button>
                  </>
                )}
              </div>
            </div>
          </section>
        );
      }
